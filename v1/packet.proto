edition = "2023";
import "google/protobuf/timestamp.proto";

package UDataPacketBrokerAPI.V1;

import "uDataPacketBrokerAPI/v1/stream_identifier.proto";
import "uDataPacketBrokerAPI/v1/data_type.proto";

/**
 * Defines a data packet.
 */
message Packet {
   /// The stream identifier that submitted this packet.
   StreamIdentifier stream_identifier = 1;
   /// The time of the first sample in the data packet (UTC).
   google.protobuf.Timestamp start_time = 2;
   /// The sampling rate in Hz.
   double sampling_rate = 3;
   /// The data type.
   DataType data_type = 4;
   /// The number of samples.
   uint32 number_of_samples = 5;
   /// The actual samples.  This is always stored in little endian.
   bytes data = 6;
   /// This does double duty.  The publisher should make a per-stream counter
   /// that tags the sent packet.  When the broker shuts down, it can then summarize
   /// that the last packet received for a stream was this sequence number.  When
   /// the broker restarts streaming to the broker can (re)commence at this point
   /// provided the publisher saved the last few packets.
   /// The subscriber client uses this when the broker drops out.  When re-establishing
   /// a connection the publisher client can then ask for the data for this stream 
   /// beginning with this sequence number (StreamFromSequence).  
   uint64 sequence_number = 7;
}
