edition = "2023";

package UDataPacketBrokerAPI.V1;

import "uDataPacketBroker/v1/packet.proto";
import "uDataPacketBroker/v1/publish_response.proto";

/*!
 * Applications importing or forwadring data send their seismic data packets to 
 * this service.
 */
service PublishService {
    /// Publish packets to this service.
    rpc Publish(stream Packet) returns(PublishResponse) {}; 
}
